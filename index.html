<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Script Runner</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@300;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00ff9d;
      --accent2: #00c4ff;
      --danger: #ff4d6d;
      --text: #e2e2f0;
      --muted: #5a5a7a;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Unbounded', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0,255,157,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .label-small {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.2rem;
      line-height: 1.5;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    /* Field */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .field-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .field-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,255,157,0.08);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    .btn-paste {
      background: var(--border);
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 0 0.85rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .btn-paste:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Script name */
    input[type="text"]#script-name {
      font-size: 0.8rem;
    }

    /* Run button */
    .btn-run {
      width: 100%;
      padding: 1rem;
      border-radius: 10px;
      border: none;
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0a0a0f;
    }

    .btn-run:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,255,157,0.25);
    }

    .btn-run:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-run .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(10,10,15,0.3);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status log */
    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.72rem;
      line-height: 1.7;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .log:empty::before {
      content: '// Лог выполнения появится здесь...';
      color: var(--muted);
    }

    .log-entry {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .log-time {
      color: var(--muted);
      flex-shrink: 0;
    }

    .log-msg { flex: 1; }
    .log-entry.ok .log-msg { color: var(--accent); }
    .log-entry.err .log-msg { color: var(--danger); }
    .log-entry.info .log-msg { color: var(--text); }
    .log-entry.warn .log-msg { color: #ffb347; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Scrollbar */
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Pulse on run */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,157,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(0,255,157,0); }
    }

    .running .btn-run {
      animation: pulse 1.5s ease infinite;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="label-small">// Google Sheets</div>
    <h1>Script <span>Runner</span></h1>
    <div class="subtitle">Запускает Apps Script в Google Таблицах по кнопке через Web App URL</div>
  </div>

  <div class="card" id="card">
    <div class="field">
      <div class="field-label">Web App URL</div>
      <div class="field-row">
        <input
          type="text"
          id="script-url"
          placeholder="https://script.google.com/macros/s/.../exec"
        />
        <button class="btn-paste" onclick="pasteUrl()">ВСТАВИТЬ</button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">Название скрипта (для лога)</div>
      <input
        type="text"
        id="script-name"
        placeholder="Мой скрипт"
        value="Мой скрипт"
      />
    </div>

    <div class="divider">выполнение</div>

    <button class="btn-run" id="run-btn" onclick="runScript()">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">▶ ЗАПУСТИТЬ</span>
      </div>
    </button>

    <div class="field">
      <div class="field-label">Лог</div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="footer">SCRIPT RUNNER · РАБОТАЕТ ЧЕРЕЗ APPS SCRIPT WEB APP</div>
</div>

<script>
  // Restore saved URL and name
  const urlInput = document.getElementById('script-url');
  const nameInput = document.getElementById('script-name');
  const DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbw24ghMybcnH_EwdODs064w0nsoQpXpYig6qTQ58TubqvrSAy_6thD-juybVNknv1CD/exec';
  const DEFAULT_NAME = 'vsporte_data';
  // Always use the latest URL from the app
  localStorage.setItem('scriptUrl', DEFAULT_URL);
  const savedUrl = DEFAULT_URL;
  const savedName = localStorage.getItem('scriptName') || DEFAULT_NAME;
  urlInput.value = savedUrl;
  nameInput.value = savedName;

  urlInput.addEventListener('input', () => localStorage.setItem('scriptUrl', urlInput.value));
  nameInput.addEventListener('input', () => localStorage.setItem('scriptName', nameInput.value));

  async function pasteUrl() {
    try {
      const text = await navigator.clipboard.readText();
      urlInput.value = text;
      localStorage.setItem('scriptUrl', text);
      log('info', 'URL вставлен из буфера обмена');
    } catch {
      log('warn', 'Вставьте URL вручную (нет доступа к буферу)');
    }
  }

  function log(type, msg) {
    const el = document.getElementById('log');
    const now = new Date();
    const time = now.toTimeString().slice(0, 8);
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${msg}</span>`;
    el.appendChild(entry);
    el.scrollTop = el.scrollHeight;
  }

  async function runScript() {
    const url = urlInput.value.trim();
    const name = nameInput.value.trim() || 'Скрипт';

    if (!url) { log('err', 'Введите Web App URL'); return; }

    setRunning(true);
    log('info', `Запуск: ${name}...`);
    const start = Date.now();

    try {
      // no-cors: браузер не читает ответ, но запрос доходит до Google
      await fetch(url, { method: 'GET', mode: 'no-cors' });
      const ms = Date.now() - start;
      log('ok', `✓ Запрос отправлен (${ms}ms)`);
      log('info', 'Скрипт выполняется на стороне Google — проверьте таблицу');
    } catch (err) {
      log('err', `Ошибка сети: ${err.message}`);
      log('warn', 'Проверьте интернет-соединение');
    } finally {
      setRunning(false);
    }
  }

  function setRunning(active) {
    const btn = document.getElementById('run-btn');
    const spinner = document.getElementById('spinner');
    const text = document.getElementById('btn-text');
    const card = document.getElementById('card');

    btn.disabled = active;
    spinner.style.display = active ? 'block' : 'none';
    text.textContent = active ? 'ВЫПОЛНЯЕТСЯ...' : '▶ ЗАПУСТИТЬ';
    card.classList.toggle('running', active);
  }
</script>

</body>
</html>
